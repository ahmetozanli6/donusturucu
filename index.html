<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F3F5F7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>İplik Dönüştürücü</title>

<!-- Fontlar (Daha Güvenli Yükleme İçin Link Formatı) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<!-- React ve Babel (Daha Güvenilir ve Hızlı CDN: cdnjs) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js" crossorigin="anonymous"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Inter', sans-serif; 
    background: #F3F5F7; 
    color: #0A1520; 
    display: flex; 
    min-height: 100vh; 
    /* Mobilde taşma durumunda güvenli hizalama için */
    min-height: 100dvh;
    padding: 24px 16px; 
  }
  
  #root {
    width: 100%;
    max-width: 500px;
    margin: auto; /* Ortalamayı kusursuz yapar, taşma olursa yukarıdan kırpmaz */
  }

  input, select { font-family: 'Inter', sans-serif; }

  /* Dinamik (Responsive) Sınıflar */
  .main-box {
    padding: 32px;
  }
  .grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
  }
  .result-box {
    padding: 24px 16px;
  }
  .result-val {
    font-size: 32px;
  }
  .title-text {
    font-size: 32px;
  }

  /* Mobil Ekranlar İçin Özel Sıkıştırma ve Düzenleme */
  @media (max-width: 480px) {
    body {
      padding: 16px 12px;
    }
    .main-box {
      padding: 20px 16px !important;
      border-radius: 20px !important;
    }
    .grid-container {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 12px !important;
    }
    .result-box {
      padding: 16px 10px !important;
      border-radius: 16px !important;
    }
    .result-val {
      font-size: 24px !important;
    }
    .title-text {
      font-size: 26px !important;
    }
    .icon-box {
      width: 56px !important;
      height: 56px !important;
      margin-bottom: 12px !important;
    }
    .icon-box svg {
      width: 28px !important;
      height: 28px !important;
    }
  }
</style>
</head>
<body>
<div id="root">
    <!-- Script yüklenene kadar ekranda bu kalır, boş beyaz ekran sorunu ortadan kalkar -->
    <div style="text-align: center; margin-top: 50vh; transform: translateY(-50%);">
        <h3 style="color: #0891B2; font-family: 'Inter', sans-serif;">Dönüştürücü Yükleniyor...</h3>
        <p style="color: #4A6880; font-size: 14px; margin-top: 10px; font-family: 'Inter', sans-serif;">Lütfen bekleyin...</p>
    </div>
</div>

<script type="text/babel" data-presets="react">
const { useState } = React;

const C = { 
  surface: '#ffffff', border: 'rgba(30,45,61,.10)', border2: 'rgba(30,45,61,.16)', 
  txt: '#0A1520', txt2: '#4A6880', teal: '#0891B2', tealS: 'rgba(8,145,178,.1)' 
};

const S = {
  inp: { 
    width: '100%', padding: '12px 16px', border: `1px solid ${C.border2}`, 
    borderRadius: 12, fontSize: 16, outline: 'none', color: C.txt, 
    background: '#fff', fontFamily: 'Inter,sans-serif', transition: 'border-color 0.2s'
  },
  lbl: { 
    fontSize: 11, fontWeight: 700, color: C.txt2, display: 'block', 
    marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.08em' 
  }
};

function App() {
  const [v, setV] = useState('');
  const [u, setU] = useState('denye');

  // Hesaplama Algoritması
  const calculate = () => {
    const x = parseFloat(v);
    if (isNaN(x) || x <= 0) return null;
    
    let d = 0;
    if (u === 'denye') d = x;
    else if (u === 'ne') d = 5315 / x;
    else if (u === 'nm') d = 9000 / x;
    else if (u === 'tex') d = x * 9;
    else if (u === 'dtex') d = x * 0.9;
    
    return {
      denye: d,
      ne: 5315 / d,
      nm: 9000 / d,
      tex: d / 9,
      dtex: d / 0.9
    };
  };

  const r = calculate(); 

  const Bx = ({ label, val }) => (
    <div className="result-box" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 20, textAlign: 'center', boxShadow: '0 4px 12px rgba(0,0,0,0.02)' }}>
      <div style={{ fontSize: 12, fontWeight: 700, color: C.txt2, marginBottom: 8 }}>{label}</div>
      <div className="result-val" style={{ fontWeight: 900, color: C.teal, fontFamily: 'monospace' }}>
        {val ? val.toFixed(2) : '-'}
      </div>
    </div>
  );

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ textAlign: 'center', marginBottom: 4 }}>
        <div className="icon-box" style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 64, height: 64, borderRadius: 20, background: 'linear-gradient(135deg,#0672A0,#0891B2)', color: '#fff', marginBottom: 16, boxShadow: '0 8px 24px rgba(8,145,178,.35)' }}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </div>
        <h2 className="title-text" style={{ fontWeight: 900, color: C.txt, letterSpacing: '-0.02em' }}>İplik Dönüştürücü</h2>
        <p style={{ fontSize: 13, color: C.txt2, marginTop: 6 }}>Değer girin ve anında diğer birimlere dönüştürün.</p>
      </div>

      <div className="main-box" style={{ background: C.surface, borderRadius: 24, border: `1px solid ${C.border}`, display: 'flex', gap: 16, flexWrap: 'wrap', alignItems: 'flex-end', boxShadow: '0 10px 40px rgba(0,0,0,0.04)' }}>
        <div style={{ flex: '1 1 140px' }}>
          <label style={S.lbl}>Değer</label>
          <input 
            type="number" 
            value={v} 
            onChange={e => setV(e.target.value)} 
            placeholder="Örn: 150"
            style={{ ...S.inp, fontSize: 18, fontWeight: 700, fontFamily: 'monospace' }}
          />
        </div>
        <div style={{ flex: '1 1 140px' }}>
          <label style={S.lbl}>Mevcut Birim</label>
          <select value={u} onChange={e => setU(e.target.value)} style={{ ...S.inp, fontSize: 15, fontWeight: 700, cursor: 'pointer' }}>
            <option value="denye">Denye (D)</option>
            <option value="ne">Ne (İngiliz Pamuk)</option>
            <option value="nm">Nm (Metrik)</option>
            <option value="tex">Tex</option>
            <option value="dtex">Dtex</option>
          </select>
        </div>
      </div>

      {r ? (
        <div className="grid-container">
          <Bx label="Denye" val={r.denye} />
          <Bx label="Ne (Pamuk)" val={r.ne} />
          <Bx label="Nm (Metrik)" val={r.nm} />
          <Bx label="Tex" val={r.tex} />
          <Bx label="Dtex" val={r.dtex} />
        </div>
      ) : (
        <div style={{ padding: '32px 20px', textAlign: 'center', color: C.txt2, background: C.surface, borderRadius: 20, border: `1px dashed ${C.border2}`, fontSize: 13 }}>
          Lütfen hesaplama yapmak için geçerli bir iplik değeri girin.
        </div>
      )}
    </div>
  );
}

const rootElement = document.getElementById('root');
if (rootElement) {
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
}
</script>
</body>
</html>
